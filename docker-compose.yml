version: '3.9'

services:
  app:
    build:
      context: .
      target: dev            # uses the "dev" stage from Dockerfile
    container_name: mediforma-dev
    restart: unless-stopped
    ports:
      - '${PORT:-3000}:3000'
    env_file:
      - .env
    environment:
      NODE_ENV: development
    volumes:
      - .:/app               # live-reload: host code → container
      - /app/node_modules    # keep container's node_modules intact
    command: npm run dev

